# =============================================================
# CDM StreamGuard — Production Stack
# Crédit du Maroc DSIG — PFE Roui Anas 2026
#
# Usage :
#   docker-compose up -d              → démarre tout
#   docker-compose up -d kafka flink  → démarre sélectif
#   docker-compose logs -f backend    → logs en direct
#   docker-compose down               → arrête tout
#
# Interfaces web :
#   Kafka UI      → http://localhost:8080
#   Flink UI      → http://localhost:8081
#   Dremio        → http://localhost:9047
#   MLflow        → http://localhost:5001
#   Grafana       → http://localhost:3000
#   OpenMetadata  → http://localhost:8585
#   FastAPI docs  → http://localhost:8000/docs
#   Dashboard     → http://localhost:3001
# =============================================================

version: "3.8"

networks:
  cdm-net:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  sqlserver-data:
  dremio-data:
  ollama-models:
  redis-data:
  postgres-data:
  mlflow-data:
  openmetadata-data:
  grafana-data:
  prometheus-data:
  flink-data:

services:

  # ===========================================================
  # COUCHE 1 — MESSAGERIE
  # ===========================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cdm-zookeeper
    networks: [cdm-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cdm-kafka
    networks: [cdm-net]
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: cdm-schema-registry
    networks: [cdm-net]
    ports:
      - "8085:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: cdm-kafka-connect
    networks: [cdm-net]
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: cdm-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _cdm-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _cdm-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _cdm-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/kafka/plugins
    volumes:
      - ./docker/kafka-plugins:/kafka/plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cdm-kafka-ui
    networks: [cdm-net]
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: cdm-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: cdm-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    restart: unless-stopped

  # ===========================================================
  # COUCHE 2 — SOURCE DE DONNÉES (Simule KONDOR+)
  # ===========================================================

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cdm-sqlserver
    networks: [cdm-net]
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "CDM_Local_2026!"
      ACCEPT_EULA: "Y"
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init.sql:/init.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa",
             "-P", "CDM_Local_2026!", "-Q", "SELECT 1",
             "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ===========================================================
  # COUCHE 3 — STREAM PROCESSING
  # ===========================================================

  flink-jobmanager:
    image: flink:1.19-scala_2.12-java17
    container_name: cdm-flink-jm
    networks: [cdm-net]
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    volumes:
      - flink-data:/opt/flink/data
      - ./streamguard:/opt/flink/streamguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.19-scala_2.12-java17
    container_name: cdm-flink-tm
    networks: [cdm-net]
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./streamguard:/opt/flink/streamguard
    restart: unless-stopped

  # ===========================================================
  # COUCHE 4 — STOCKAGE DATALAKE
  # ===========================================================

  dremio:
    image: dremio/dremio-oss:24.3.0
    container_name: cdm-dremio
    networks: [cdm-net]
    ports:
      - "9047:9047"
      - "31010:31010"
    environment:
      DREMIO_JAVA_EXTRA_OPTS: >
        -Ddremio.iceberg.enabled=true
    volumes:
      - dremio-data:/opt/dremio/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9047"]
      interval: 30s
      timeout: 15s
      retries: 10
    restart: unless-stopped

  # ===========================================================
  # COUCHE 5 — LLM LOCAL
  # ===========================================================

  ollama:
    image: ollama/ollama:latest
    container_name: cdm-ollama
    networks: [cdm-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # GPU NVIDIA — décommenter si disponible :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: cdm-ollama-init
    networks: [cdm-net]
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        ollama pull qwen2.5:7b-instruct &&
        ollama pull mistral:7b-instruct &&
        echo 'Models ready'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama-models:/root/.ollama
    restart: "no"

  # ===========================================================
  # COUCHE 6 — INFRASTRUCTURE APPLICATIVE
  # ===========================================================

  redis:
    image: redis:7.2-alpine
    container_name: cdm-redis
    networks: [cdm-net]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cdm-postgres
    networks: [cdm-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cdm_metadata
      POSTGRES_USER: cdm_user
      POSTGRES_PASSWORD: CDM_PG_2026!
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdm_user -d cdm_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================
  # COUCHE 7 — ML TRACKING
  # ===========================================================

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: cdm-mlflow
    networks: [cdm-net]
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://cdm_user:CDM_PG_2026!@postgres:5432/cdm_metadata
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://cdm_user:CDM_PG_2026!@postgres:5432/cdm_metadata
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================================
  # COUCHE 8 — MONITORING
  # ===========================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cdm-prometheus
    networks: [cdm-net]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: cdm-grafana
    networks: [cdm-net]
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: CDM_Grafana_2026!
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ===========================================================
  # COUCHE 9 — STREAMGUARD PIPELINE
  # ===========================================================

  streamguard:
    build:
      context: .
      dockerfile: docker/streamguard/Dockerfile
    container_name: cdm-streamguard
    networks: [cdm-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPIC_SOURCE: cdm.sisdm.kondor.dbo.deals
      TOPIC_SECURE: cdm.sisdm.kondor.dbo.deals.secure
      TOPIC_AUDIT: cdm.streamguard.audit
      REDIS_URL: redis://redis:6379
      CDM_PSEUDONYM_SECRET: cdm_secret_change_in_prod
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b-instruct
    volumes:
      - ./streamguard:/app/streamguard
      - ./cdm_extensions:/app/cdm_extensions
      - ./templates:/app/templates
    restart: unless-stopped

  synthetic-generator:
    build:
      context: .
      dockerfile: docker/generator/Dockerfile
    container_name: cdm-generator
    networks: [cdm-net]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPIC_DEALS: cdm.sisdm.kondor.dbo.deals
      DEALS_PER_MINUTE: 10
      ANOMALY_RATE: 0.05
    volumes:
      - ./synthetic_data:/app
    restart: unless-stopped

  # ===========================================================
  # COUCHE 10 — BACKEND API
  # ===========================================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdm-backend
    networks: [cdm-net]
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      dremio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379
      DREMIO_HOST: dremio
      DREMIO_PORT: 9047
      DREMIO_USER: cdm_user
      DREMIO_PASSWORD: CDM_Dremio_2026!
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b-instruct
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # LLM Cloud — optionnel pour benchmark
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ===========================================================
  # COUCHE 11 — FRONTEND REACT
  # ===========================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdm-frontend
    networks: [cdm-net]
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
